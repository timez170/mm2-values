name: Update MM2 Values

# Runs the scraper on a schedule and commits values.json ONLY if something changed.
on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours (UTC). Adjust as you like.
  workflow_dispatch: {}          # allow manual runs from the Actions tab

permissions:
  contents: write                # needed to commit values.json back to the repo

concurrency:
  group: mm2-values
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape + reconcile values
        env:
          # Optional: add these as repo secrets (Settings → Secrets and variables → Actions)
          # to get pinged when values change. Omit them and the run is silent.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: node update-values.mjs --verbose

      - name: Commit if values changed
        run: |
          if [ -n "$(git status --porcelain values.json CHANGELOG.md)" ]; then
            git config user.name  "mm2-values-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add values.json CHANGELOG.md
            git commit -m "chore(values): auto-update MM2 values ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed updated values."
          else
            echo "No value changes — nothing to commit."
          fi
