<style>
  :root{
    --bg:#0a0e1a; --card:rgba(19,26,43,.66); --card2:rgba(24,32,52,.6);
    --line:#1f2940; --line2:#2a3750; --text:#e8edf6; --muted:#76849f; --muted2:#97a4bf;
    --violet:#a78bfa; --violet2:#8b5cf6; --cyan:#34d3ee;
    --win:#34d399; --fair:#fbbf24; --lose:#fb7185;
    --r-sm:9px; --r-md:12px; --r-lg:15px; --r-xl:18px;
    --fast:.15s; --slow:.45s; --ease:cubic-bezier(.22,.7,.3,1);
    --shadow:0 8px 24px -12px rgba(0,0,0,.6);
    --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --round:"SF Pro Rounded",ui-rounded,"Segoe UI",var(--font);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(900px 460px at 10% -10%,rgba(124,58,237,.14),transparent 55%),radial-gradient(760px 420px at 98% 0%,rgba(34,184,214,.09),transparent 52%),var(--bg);
    color:var(--text);min-height:100vh;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;background-image:radial-gradient(rgba(124,140,180,.05) 1px,transparent 1px);background-size:24px 24px}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(125% 125% at 50% 32%,transparent 60%,rgba(0,0,0,.20))}
  .glow{position:fixed;border-radius:9999px;filter:blur(90px);pointer-events:none;z-index:0;opacity:.4}
  .glow1{top:-120px;left:-90px;width:300px;height:300px;background:rgba(124,58,237,.16)}
  .glow2{bottom:-140px;right:-90px;width:320px;height:320px;background:rgba(34,184,214,.11)}
  #app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:14px 16px 36px}

  .row{display:flex;align-items:center}.between{justify-content:space-between}.center{justify-content:center}
  .wrap{flex-wrap:wrap}.col{flex-direction:column}.min0{min-width:0}
  .gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
  .mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mt2{margin-top:2px}.mt4{margin-top:4px}.mt8{margin-top:8px}
  .b{font-weight:700;color:#f3f6fc}.sb{font-weight:600}.sm{font-size:13px}.xs{font-size:11px}
  .r{text-align:right}.tab-num{font-variant-numeric:tabular-nums}
  .mut{color:var(--muted)}.mut2{color:var(--muted2)}.dim{color:#4a5773}
  .tv-card{background:linear-gradient(180deg,rgba(124,58,237,.12),rgba(124,58,237,.02));border-color:rgba(139,92,246,.32)}
  .tv-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:13px}
  .tv-sub{color:var(--muted2);font-weight:500;font-size:11.5px}
  .tv-conf{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:9999px;border:1px solid;white-space:nowrap}
  .tv-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .tv-side{display:flex;flex-direction:column;gap:2px;min-width:0}
  .tv-r{align-items:flex-end;text-align:right}
  .tv-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em}
  .tv-val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.05}
  .tv-band{font-size:11px;color:var(--muted2);font-variant-numeric:tabular-nums;margin-top:1px}
  .tv-mid{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px}
  .tv-verdict{font-size:14.5px;font-weight:800;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .tv-gap{font-size:11.5px;color:var(--muted2);font-variant-numeric:tabular-nums;white-space:nowrap}
  .tv-foot{margin-top:13px;font-size:11px;color:var(--muted2);line-height:1.55;display:flex;align-items:flex-start;gap:6px}
  @media(max-width:520px){ .tv-val{font-size:20px} .tv-verdict{font-size:13px} }
  .ic{display:inline-block;vertical-align:middle;flex:none}
  .ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* header */
  .hdr{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:transparent;box-shadow:0 8px 20px rgba(139,92,246,.30);position:relative;overflow:hidden}
  .logo-img{width:100%;height:100%;display:block;object-fit:cover}
  /* .logo gloss removed: image carries its own finish */
  .title{font-family:var(--round);font-size:18px;font-weight:800;letter-spacing:-.01em;margin:0;line-height:1.05}
  .tagline{font-size:11px;color:var(--muted2);margin:3px 0 0;display:flex;align-items:center;gap:5px}
  .brandmark{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:900;letter-spacing:.5px}
  .ftr-social{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:2px}
  .ftr-social a{display:inline-flex;align-items:center;gap:6px;color:var(--muted2);text-decoration:none;font-weight:600;transition:color .15s var(--ease)}
  .ftr-social a:hover{color:#c4b5fd}
  .ftr-copy{color:var(--muted);opacity:.85}
  .tabs{display:flex;gap:3px;background:rgba(14,19,32,.7);border:1px solid var(--line);border-radius:12px;padding:3px;box-shadow:var(--shadow)}
  .tab{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;background:transparent;border:none;color:var(--muted2);cursor:pointer;transition:color var(--fast),background var(--fast);font-family:var(--font)}
  .tab:hover{color:#dce4f1}.tab-on{background:rgba(124,58,237,.16);color:#f3f6fc;box-shadow:inset 0 0 0 1px rgba(124,58,237,.3)}
  .tab-n{font-size:10px;padding:1px 6px;border-radius:9999px;background:#313e5a;color:#cdd6e8}
  .tab-on .tab-n{background:rgba(124,58,237,.45);color:#fff}

  .card{border:1px solid var(--line);background:var(--card);backdrop-filter:blur(10px);border-radius:var(--r-lg);padding:13px;box-shadow:var(--shadow)}
  .grid2{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:760px){.grid2{grid-template-columns:1fr 1fr}}
  .dot{width:8px;height:8px;border-radius:9999px;display:inline-block;flex:none}
  .subt{font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}

  /* panel */
  .panel{display:flex;flex-direction:column}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .search-wrap{position:relative}
  .search-box{display:flex;align-items:center;gap:8px;border-radius:var(--r-md);padding:8px 11px;background:rgba(12,18,31,.7);border:1px solid var(--line2);transition:border-color var(--fast),box-shadow var(--fast)}
  .search-box:focus-within{border-color:var(--violet2);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
  .search-input{flex:1;background:transparent;border:none;outline:none;color:#f3f6fc;font-size:13.5px;min-width:0;font-family:var(--font)}
  .search-input::placeholder{color:var(--muted)}
  .x-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;display:flex}.x-btn:hover{color:#cdd6e8}
  .dropdown{position:absolute;z-index:40;margin-top:5px;width:100%;border:1px solid var(--line2);border-radius:var(--r-md);background:#0c1220;box-shadow:0 24px 60px rgba(0,0,0,.62);overflow:hidden}
  .dd-list{max-height:268px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  .dd-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 11px;background:none;border:none;cursor:pointer;text-align:left;color:var(--text);border-left:2px solid transparent;transition:background var(--fast)}
  .dd-item:hover,.dd-item.active{background:rgba(124,58,237,.14);border-left-color:var(--violet)}
  .dd-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-d{font-size:9.5px;color:var(--muted);font-weight:700}
  .dd-val{font-size:11px;font-variant-numeric:tabular-nums;flex:none;white-space:nowrap}
  .dd-empty{padding:13px;font-size:12.5px;color:var(--muted2);display:flex;align-items:center;gap:8px}
  .dd-hint{padding:5px 11px;font-size:9.5px;color:var(--muted);border-top:1px solid var(--line);display:flex;gap:10px;background:rgba(255,255,255,.012)}

/* ===========================================================================
   MATH / ANALYSIS  (pure functions — unit tested)
   bound: "mid" | "lo" | "hi"  → uses range endpoints when present
   =========================================================================== */
function valueOf(it,site,bound="mid"){
  if(!it||it.placeholder) return null;
  const base=it[site]; if(base==null) return null;
  if(bound==="mid"||!it.range) return base;
  const [lo,hi]=it.range;
  if(site==="supreme") return bound==="lo"?lo:hi;
  // Range is published on Supreme's scale — scale mm2 proportionally.
  const sMid=it.supreme!=null?it.supreme:base, ratio=(bound==="lo"?lo:hi)/(sMid||1);
  return base*ratio;
}
function sideTotal(items,site,bound="mid"){
  let total=0; const missing=[];
  for(const {id,qty} of items){
    const it=BY_ID[id]; if(!it) continue;
    const q=clampQty(qty);
    if(it.placeholder){ missing.push(it); continue; }
    const v=valueOf(it,site,bound); if(v==null){ missing.push(it); continue; }
    total += v*q;
  }
  return {total,missing};
}
function combinedVal(it,bound="mid"){
  if(!it||it.placeholder) return null;
  const a=valueOf(it,"supreme",bound);
  return a!=null ? a : valueOf(it,"mm2",bound);           // follow Supreme Values; MM2 only when Supreme has no value
}
/* ===========================================================================
   RECONCILIATION ENGINE  —  fuse Supreme + MM2Values (+ Supreme's ranged value)
   into one "True Value" with an uncertainty band and a calibrated 0-100
   confidence. Robust: the point estimate blends the mean with the median of all
   anchors, so a single outlying list can't dominate. Additive layer — the core
   WFL math still uses combinedVal, so verdict calibration is unchanged. Pure.
   =========================================================================== */
function reconcile(it){
  if(!it || it.placeholder) return null;
  const s=it.supreme, m=it.mm2;
  if(s==null && m==null) return null;
  const usingSupreme = s!=null;
  const value = usingSupreme ? s : m;                     // True Value follows Supreme; MM2 only as a fallback
  let lo=value, hi=value;
  if(it.range && it.range.length===2){ lo=Math.min(value,it.range[0]); hi=Math.max(value,it.range[1]); } // band = Supreme's published range only
  const both = s!=null && m!=null;
  let conf=91;
  if(!usingSupreme) conf-=20;                             // no Supreme listing -> MM2 fallback, less certain
  const widthPct = value>0 ? (hi-lo)/value*100 : 0;
  conf-=Math.min(16, widthPct*0.5);
  const stab=STAB_SCORE[it.trend];
  if(stab!=null){ if(stab>=7) conf+=4; else if(stab<=2) conf-=10; else if(stab===5) conf-=6; }
  if(it.demand==null) conf-=4; if(it.rarity==null) conf-=2;
  conf=Math.max(5,Math.min(99,Math.round(conf)));
  const divPct = both ? Math.abs(s-m)/(((s+m)/2)||1)*100 : 0;   // kept for the cross-site reference card only
  return { value, lo, hi, conf, divPct, both, higher: both ? (s>m?"supreme":(m>s?"mm2":"even")) : (usingSupreme?"supreme":"mm2") };
}
// reconciled "True Value" for a whole side: sum of per-item reconcile(), value-weighted confidence,
// independent-interval band (sum of per-item lo/hi). Priceless/unvalued items are flagged, not zeroed.
function reconciledSide(items){
  let value=0, lo=0, hi=0, cwv=0, cw=0, priceless=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it) continue; const q=clampQty(qty);
    const r=reconcile(it);
    if(!r){ if(it.placeholder) priceless+=q; continue; }
    value+=r.value*q; lo+=r.lo*q; hi+=r.hi*q; cwv+=r.conf*r.value*q; cw+=r.value*q; }
  return { value, lo, hi, conf: cw>0?Math.round(cwv/cw):0, priceless };
}
function combinedSide(items,bound="mid"){
  let total=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it) continue; const v=combinedVal(it,bound); if(v!=null) total+=v*clampQty(qty); }
  return total;
}
function verdict(give,receive){
  if(give===0 && receive===0) return {result:"none",magnitude:"No items",diff:0,pct:0};
  const diff=receive-give, base=give>0?give:receive, pct=(diff/base)*100, a=Math.abs(pct);
  let result,magnitude;
  if(a<=FAIR){result="fair";magnitude="Fair Trade";}
  else if(diff>0){result="win";magnitude=a>BIG?"Big Win":"Small Win";}
  else {result="lose";magnitude=a>BIG?"Big Loss":"Small Loss";}
  return {result,magnitude,diff,pct};
}
// value-weighted average demand for a side (items with demand only)
function sideDemand(items){
  let wsum=0,w=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it||it.demand==null) continue;
    const v=combinedVal(it)||1, q=clampQty(qty); wsum+=it.demand*v*q; w+=v*q; }
  return w>0? wsum/w : null;
}
// suggestion to reach a Fair trade (approximate, on combined values)
function balanceSuggestion(give,receive){
  if(give===0 && receive===0) return null;
  const v=verdict(give,receive);
  if(v.result==="fair"||v.result==="none") return {fair:true};
  if(v.diff<0){ const target=give*(1-FAIR/100); return {fair:false,side:"their",add:Math.max(1,Math.round(target-receive))}; }
  const target=receive*(1-FAIR/100); return {fair:false,side:"your",add:Math.max(1,Math.round(target-give))};
}
// specific item suggestions that bring the trade to Fair (tap to add to the lighter side)
function balanceItems(bal){
  if(!bal || bal.fair) return null;
  const side = bal.side==="their" ? "them" : "you";
  const present = new Set((side==="you"?state.your:state.their).map(x=>x.id));
  const target = bal.add;
  const scored = ALL.filter(it=> !it.placeholder && combinedVal(it)!=null && !present.has(it.id))
    .map(it=>{ const v=combinedVal(it); return {it, v, d:Math.abs(v-target)}; })
    .sort((a,b)=> a.d-b.d).slice(0,3);
  return scored.length ? { side, items: scored.map(o=>({id:o.it.id, name:o.it.name, v:o.v, cat:o.it.category})) } : null;
}
function intel(your,their){
  const gD=sideDemand(your), rD=sideDemand(their), notes=[];
  if(rD!=null){
    if(rD>=5) notes.push({s:"up",t:`You're receiving high-demand items (avg ${rD.toFixed(1)}/10) — easy to re-trade later.`});
    else if(rD>=3) notes.push({s:"flat",t:`Items you'd receive have moderate demand (avg ${rD.toFixed(1)}/10) — reasonable to move on.`});
    else notes.push({s:"down",t:`Items you'd receive are low-demand (avg ${rD.toFixed(1)}/10) — they can be slow to re-trade even at fair value.`});
  }
  const recvCaution=[],recvUp=[],giveOverpaid=[];
  their.forEach(({id})=>{ const it=BY_ID[id]; if(!it||!it.trend) return; const s=TREND_SENT[it.trend];
    if(it.trend==="Overpaid For") recvCaution.push(it.name+" (pulls above value)");
    else if(s==="down") recvCaution.push(it.name);
    else if(s==="up") recvUp.push(it.name); });
  your.forEach(({id})=>{ const it=BY_ID[id]; if(it&&it.trend==="Overpaid For") giveOverpaid.push(it.name); });
  if(recvUp.length) notes.push({s:"up",t:`Rising / improving on your side: ${[...new Set(recvUp)].join(", ")} — potential upside.`});
  if(recvCaution.length) notes.push({s:"down",t:`Watch on items you'd receive: ${[...new Set(recvCaution)].join(", ")} — value may be soft or volatile.`});
  if(giveOverpaid.length) notes.push({s:"up",t:`Good to offload: ${[...new Set(giveOverpaid)].join(", ")} currently pull above listed value.`});

}
function buildAnalysis(your,their){
  const hasTrade = your.length>0 && their.length>0;
  const sy=sideTotal(your,"supreme"), st=sideTotal(their,"supreme");
  const my=sideTotal(your,"mm2"), mt=sideTotal(their,"mm2");
  const supreme={...verdict(sy.total,st.total),you:sy.total,them:st.total,missY:sy.missing,missT:st.missing};
  const mm2={...verdict(my.total,mt.total),you:my.total,them:mt.total,missY:my.missing,missT:mt.missing};
  const cy=combinedSide(your), ct=combinedSide(their);
  const combined={...verdict(cy,ct),you:cy,them:ct};
  const agree = supreme.result===mm2.result;
  // ranged best / worst case (combined)
  const giveLo=combinedSide(your,"lo"), giveHi=combinedSide(your,"hi");
  const getLo=combinedSide(their,"lo"), getHi=combinedSide(their,"hi");
  const best=verdict(giveLo,getHi), worst=verdict(giveHi,getLo);
  const hasRange=[...your,...their].some(o=>BY_ID[o.id]&&BY_ID[o.id].range);
  // divergences
  const ids=new Set([...your,...their].map(x=>x.id)); const divergences=[];
  ids.forEach(id=>{ const it=BY_ID[id]; if(!isDivergent(it)) return;
    const rel=(Math.abs(it.supreme-it.mm2)/((it.supreme+it.mm2)/2))*100;
    divergences.push({it,rel,higher: it.supreme>it.mm2?"Supreme":"MM2Values"}); });
  divergences.sort((a,b)=>b.rel-a.rel);
  // breakdown lines with value share
  const lines=[];
  const push=(arr,side,total)=>arr.forEach(({id,qty})=>{ const it=BY_ID[id]; if(!it) return;
    const cv=combinedVal(it), q=clampQty(qty); lines.push({it,qty:q,side,share: total>0&&cv!=null?(cv*q/total*100):0}); });
  push(your,"you",cy); push(their,"them",ct);
  const balance=hasTrade?balanceSuggestion(cy,ct):null;
  const intelData=hasTrade?intel(your,their):null;
  let conf="Medium";
  if(hasTrade){ let score=0; if(agree) score++; if(intelData.rD!=null&&intelData.rD>=4) score++;
    if(intelData.notes.some(n=>n.s==="down")) score--;
    if(supreme.missY.length||supreme.missT.length||mm2.missY.length||mm2.missT.length) score--;
    conf = score>=2?"High":score<=-1?"Low":"Medium"; }
  const ry=reconciledSide(your), rt=reconciledSide(their);
  const trueV = hasTrade ? { ...verdict(ry.value, rt.value), you:ry.value, them:rt.value,
    youLo:ry.lo, youHi:ry.hi, themLo:rt.lo, themHi:rt.hi, youConf:ry.conf, themConf:rt.conf,
    conf: (ry.value+rt.value)>0 ? Math.round((ry.conf*ry.value+rt.conf*rt.value)/(ry.value+rt.value)) : 0,
    priceless: ry.priceless+rt.priceless } : null;
  return {hasTrade,supreme,mm2,combined,agree,divergences,lines,intel:intelData,conf,
    range:{has:hasRange,best,worst}, balance, trueV};
}

/* ===========================================================================
   TRADE RECOMMENDATION ENGINE  —  accept / decline / counter, with a 0–100
   confidence score and a plain-English "why". Goes beyond raw value: a small
   value gain on a low-demand / illiquid / falling item is correctly flagged as
   not worth taking. Weighted-sum model over six factors with a non-compensatory
   demand/liquidity floor (the "demand trap" guardrail). Pure + unit-tested.
   =========================================================================== */
const STAB_SCORE={"Rising":9,"Overpaid For":8,"Doing Well":7,"Improving":6,"Fluctuating":5,"Receding":4,"Stable":3,"Underpaid For":2,"Decreasing":1,"Untradable":0,"Unsafe":0};
const PRESTIGE={Chroma:1.0,Ancient:1.0,Unique:1.0,Godly:0.8,Set:0.7,Vintage:0.6,Legendary:0.45,Rare:0.3,Uncommon:0.2,Common:0.1};
const REC_W={value:0.34,demand:0.22,liquidity:0.16,stability:0.14,desire:0.08,rarity:0.06};
const REC_LABELS={value:"Value",demand:"Demand",liquidity:"Liquidity",stability:"Stability",desire:"Desirability",rarity:"Rarity-fit"};
const clamp01=x=>Math.max(0,Math.min(1,x));
const clamp100=x=>Math.max(0,Math.min(100,x));
function stabScore01(it){ const s=it&&it.trend?STAB_SCORE[it.trend]:null; return s==null?(3/9):(s/9); }

// history.json-derived metrics for one item id: volatility (CV), momentum (slope), drawdown
function histMetrics(id){
  if(!HISTORY||!HISTORY.values) return null;
  const raw=HISTORY.values[id]; if(!Array.isArray(raw)) return null;
  const pts=raw.filter(v=>v!=null&&isFinite(v)); if(pts.length<3) return null;
  const n=pts.length, mean=pts.reduce((a,b)=>a+b,0)/n; if(mean<=0) return null;
  const variance=pts.reduce((a,b)=>a+(b-mean)*(b-mean),0)/n, cv=Math.sqrt(variance)/mean;
  let sx=0,sy=0,sxy=0,sxx=0; for(let i=0;i<n;i++){ sx+=i; sy+=pts[i]; sxy+=i*pts[i]; sxx+=i*i; }
  const denom=(n*sxx-sx*sx)||1, slope=(n*sxy-sx*sy)/denom, normSlope=(slope*(n-1))/mean;
  let peak=pts[0], mdd=0; for(const v of pts){ if(v>peak)peak=v; const dd=(peak-v)/peak; if(dd>mdd)mdd=dd; }
  return {n,cv,normSlope,mdd};
}
function itemTrend01(it){ const label=stabScore01(it), m=histMetrics(it.id);
  if(!m) return label;
  const mom=clamp01(0.5+m.normSlope*2), vol=clamp01(m.cv/0.5), dd=clamp01(m.mdd/0.4);
  return clamp01(0.40*label + 0.35*mom + 0.15*(1-vol) + 0.10*(1-dd)); }
function bellValue(v){ if(v==null||v<=0) return 0.5; const x=Math.log10(v)-Math.log10(300); return Math.exp(-(x*x)/(2*0.8*0.8)); }
function itemLiquidity01(it){ const d=it.demand==null?0.5:it.demand/10, m=histMetrics(it.id),
  vol=m?(1-clamp01(m.cv/0.5)):0.6, val=bellValue(combinedVal(it)), rar=it.rarity==null?0.75:(1-clamp01((it.rarity-5)/5)*0.5);
  return clamp01(0.50*d + 0.25*vol + 0.15*val + 0.10*rar); }
function itemDesire01(it){ const d=it.demand==null?0.4:it.demand/10, prestige=PRESTIGE[it.category]??0.3, label=stabScore01(it), rar=it.rarity==null?0.4:it.rarity/10;
  return clamp01(0.45*d + 0.25*prestige + 0.20*label + 0.10*rar); }
function sideAgg(items,fn){ let wsum=0,w=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it||it.placeholder) continue; const v=(combinedVal(it)||1)*clampQty(qty); wsum+=fn(it)*v; w+=v; }
  return w>0? wsum/w : null; }
function dominantItem(items){ let best=null,bv=-1;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it||it.placeholder) continue; const v=(combinedVal(it)||0)*clampQty(qty); if(v>bv){bv=v;best=it;} } return best; }
function recTrendWord(it){ const m=histMetrics(it.id);
  if(m){ if(m.normSlope<=-0.08) return "falling"; if(m.normSlope>=0.08) return "rising"; if(m.cv>=0.25) return "volatile"; }
  const s=it&&it.trend?TREND_SENT[it.trend]:null; return s==="down"?"falling":s==="up"?"rising":s==="warn"?"volatile":"stable"; }

function buildRecReasons(d){
  const out=[], a=Math.abs(d.pct), rn=d.domR?d.domR.name:"the item you'd receive";
  if(a<=d.tau) out.push(`Values are within ${a.toFixed(1)}% — essentially even.`);
  else if(d.pct>0) out.push(`You gain ${a.toFixed(1)}% in value.`);
  else out.push(`You give up ${a.toFixed(1)}% in value.`);
  if(d.recvDemand!=null && d.recvDemand<=4){
    const tw=d.domR?recTrendWord(d.domR):"stable", tb=(tw==="falling"||tw==="volatile")?` and has been ${tw} recently`:"";
    out.push(`But ${rn} has low demand (${d.recvDemand.toFixed(1)}/10)${tb} — it can be hard to trade back out.`);
  } else if(d.recvDemand!=null && d.recvDemand>=7){
    out.push(`${rn} is high-demand (${d.recvDemand.toFixed(1)}/10) and easy to re-trade.`);
  }
  if(d.trap) out.push(`This converts easier-to-trade items into one hard-to-sell asset — the classic "demand trap."`);
  if(d.giveTrend>0.62 && d.domG && recTrendWord(d.domG)==="rising") out.push(`You'd also be giving away ${d.domG.name}, which has been rising.`);
  if(out.length<2 && d.recvLiq!=null && d.recvLiq<0.4) out.push(`The items you'd receive look slow to move (low estimated liquidity).`);
  return out.slice(0,4);
}

function tradeRecommendation(your,their,A){
  A = A || buildAnalysis(your,their);
  if(!A.hasTrade) return {incomplete:true};
  const give=A.combined.you, get=A.combined.them, tau=FAIR;
  const pct = (give+get)>0 ? ((get-give)/((get+give)/2))*100 : 0;

  const recvDemand=sideDemand(their), giveDemand=sideDemand(your);
  const recvLiq=sideAgg(their,itemLiquidity01), giveLiq=sideAgg(your,itemLiquidity01);
  const recvTrend=sideAgg(their,itemTrend01)??0.5, giveTrend=sideAgg(your,itemTrend01)??0.5;
  const recvDes=sideAgg(their,itemDesire01)??0.4;
  const recvRarFit=sideAgg(their,it=>(it.rarity==null||it.demand==null)?0.3:(it.rarity/10)*(it.demand/10))??0.3;

  let F1=clamp100(50 + 50*(pct/(3*tau))), rangeFair=false;
  if(A.range && A.range.has){
    const gLo=combinedSide(your,"lo"),gHi=combinedSide(your,"hi"),rLo=combinedSide(their,"lo"),rHi=combinedSide(their,"hi");
    const ov=Math.max(0,Math.min(gHi,rHi)-Math.max(gLo,rLo)), span=Math.max(gHi,rHi)-Math.min(gLo,rLo);
    if(span>0 && ov/span>0.5){ rangeFair=true; F1=50+(F1-50)*0.4; }
  }
  let F2=(recvDemand==null?50:(recvDemand/10)*100);
  if(recvDemand!=null && giveDemand!=null) F2=clamp100(F2 + 4*(recvDemand-giveDemand));
  const F3=(recvLiq==null?55:recvLiq*100), F4=clamp100(50+50*(recvTrend-giveTrend)), F5=recvDes*100, F6=recvRarFit*100;

  const raw = REC_W.value*F1 + REC_W.demand*F2 + REC_W.liquidity*F3 + REC_W.stability*F4 + REC_W.desire*F5 + REC_W.rarity*F6;
  let desirability=raw, trap=false;
  if(recvDemand!=null && recvDemand<=3 && pct<15){ desirability=Math.min(desirability, pct<=tau?33:45); trap=true; }
  if(recvLiq!=null && recvLiq<0.30 && pct<10){ desirability=Math.min(desirability, pct<=tau?34:40); trap=true; }
  desirability=clamp100(desirability);

  const band=desirability>=65?"hi":desirability>=50?"mid":desirability>=35?"lo":"vlo";
  const dband=pct>tau?"gain":pct<-tau?"lose":"fair";
  const T={ gain:{hi:"Accept",mid:"Lean Accept",lo:"Counter",vlo:"Lean Decline"},
            fair:{hi:"Lean Accept",mid:"Fair",lo:"Fair",vlo:"Lean Decline"},
            lose:{hi:"Lean Accept",mid:"Counter",lo:"Decline",vlo:"Decline"} };
  const verdict=T[dband][band];
  let counterHint=null;
  if(verdict==="Counter") counterHint = dband==="lose" ? "ask them to add a little value to even it out" : "ask for a higher-demand item of similar value instead";

  // confidence
  const domR=dominantItem(their), domG=dominantItem(your); let conf=100;
  if((domR&&!histMetrics(domR.id))||(domG&&!histMetrics(domG.id))) conf-=18;
  if((domR&&domR.demand==null)||(domG&&domG.demand==null)) conf-=12;
  const singleSrc=(domR&&domR.mm2==null)||(domG&&domG.mm2==null); if(singleSrc) conf-=15;
  if(A.divergences.length) conf-=clamp100(A.divergences[0].rel)*0.2;
  if(A.range&&A.range.has) conf-=Math.min(15, Math.abs(A.range.best.pct-A.range.worst.pct)*0.5);
  if(domR){ const m=histMetrics(domR.id); if(m) conf-=clamp01(m.cv/0.5)*12; }
  if(Math.abs(desirability-50)<8 || Math.abs(pct)<tau/2) conf-=10;
  if(Math.abs(pct)>2*tau && A.divergences.length===0 && !singleSrc) conf+=8;
  conf=Math.round(clamp100(conf));
  const confBand=conf>=75?"High":conf>=50?"Medium":"Low";

  const reasons=buildRecReasons({pct,tau,recvDemand,giveDemand,recvTrend,giveTrend,recvLiq,trap,domR,domG});
  // high-value caution: thin/volatile data matters more on big trades
  const bigTrade=Math.max(give,get)>=5000;
  if(bigTrade) conf=Math.min(conf,70);

  return { verdict, desirability:Math.round(desirability), conf, confBand, confCapped:bigTrade,
    pct, trap, counterHint, rangeFair, reasons,
    factors:{value:Math.round(F1),demand:Math.round(F2),liquidity:Math.round(F3),stability:Math.round(F4),desire:Math.round(F5),rarity:Math.round(F6)},
    recvDemand, giveDemand, recvLiq };
}

// POPULAR (curated quick-access list) is computed in buildData() from POPULAR_NAMES.
const VIRTUAL={ "Popular":i=>POPULAR.includes(i.id), "High Demand":i=>(i.demand||0)>=5, "Recent":i=>state.recents.includes(i.id) };
function inCat(i,cat){ if(cat==="All") return true; if(VIRTUAL[cat]) return VIRTUAL[cat](i); return i.category===cat; }
function sortKey(it){ return state.sort==="demand"?(it.demand??-1): state.sort==="rarity"?(it.rarity??-1): (it.supreme??it.mm2??0); }
function searchItems(side){
  const q=norm(state["q_"+side]||""), cat=state["cat_"+side]||"All";
  let pool=ALL.filter(i=>inCat(i,cat));
  if(q){
    const scored=[];
    for(const it of pool){ const h=HAY[it.id]; let s=0;
      if(h.name.startsWith(q)) s=4; else if(h.text.startsWith(q)) s=3;
      else if(h.text.includes(q)) s=2; else if(subseq(q,h.text)) s=1;
      if(s>0) scored.push([s,it]); }
    scored.sort((a,b)=> b[0]-a[0] || sortKey(b[1])-sortKey(a[1]));
    return scored.map(x=>x[1]).slice(0,12);
  }
  // empty query → browse: Popular by default, High Demand by demand, else tier by chosen sort
  if(cat==="Recent") return state.recents.map(id=>BY_ID[id]).filter(Boolean);
  if(cat==="All"||cat==="Popular") return POPULAR.map(id=>BY_ID[id]).filter(Boolean);
  if(cat==="High Demand") return pool.slice().sort((a,b)=>(b.demand||0)-(a.demand||0)).slice(0,50);

}

/* ============ THEME / FX ENGINE ============
   Single source of truth for themes (THEME_LABELS) + a registry of pure-CSS
   particle generators (FX). Each generator returns innerHTML for the #fx layer.
   - Motion is transform/opacity only -> GPU-composited, no JS rAF loop, the
     browser pauses it when the tab is hidden (zero idle CPU).
   - #fx lives OUTSIDE #app, so re-rendering the app never restarts an effect.
   - prefers-reduced-motion: particles are skipped entirely (themed gradients stay).
   - applyTheme() is idempotent and defensive: safe to call any number of times. */
const THEME_LABELS={
  vibe:"\ud83c\udf0c Vibe", rain:"\ud83c\udf27 Rain", horizon:"\ud83c\udf05 Horizon",
  rainforest:"\ud83c\udf34 Rainforest", sakura:"\ud83c\udf38 Sakura",
  meteor:"\u2604\ufe0f Meteor", firewarm:"\ud83d\udd25 Fire", snowy:"\u2744\ufe0f Snowy"
};
const THEME_KEYS=Object.keys(THEME_LABELS);
const _rng=(a,b)=>a+Math.random()*(b-a);
const _f=(n,d)=>n.toFixed(d===undefined?2:d);
function _reduceMotion(){ try{ return !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches); }catch(e){ return false; } }
const FX={
  vibe(){
    let m=""; for(let i=0;i<15;i++){ const l=_f(_rng(0,100)),sz=_f(_rng(3,7),0),dur=_f(_rng(12,21)),del=_f(_rng(-21,0)),o=_f(_rng(.10,.34));
      m+=`<span class="vmote" style="left:${l}%;width:${sz}px;height:${sz}px;--o:${o};animation-duration:${dur}s;animation-delay:${del}s"></span>`; }
    return `<div class="fxw vibe-fx"><div class="vibe-aura"></div><div class="vibe-aura a2"></div><div class="vibe-glow"></div><div>${m}</div></div>`;
  },
  rain(){
    let d=""; for(let i=0;i<54;i++){ const l=_f(_rng(0,100)),dur=_f(_rng(.5,.95)),del=_f(_rng(-1.4,0)),h=_f(_rng(40,110),0),o=_f(_rng(.18,.55));
      d+=`<span class="drop" style="left:${l}%;height:${h}px;animation-duration:${dur}s;animation-delay:${del}s;opacity:${o}"></span>`; }
    return `<div class="fxw"><div class="rain">${d}</div><div class="lightning"></div><div class="lightning l2"></div></div>`;
  },

/* ===== Procedural ambient audio (Web Audio; zero assets, CSP-safe). Lazy-initialised on first
   enable, gesture-gated (browsers block autoplay), and suspended whenever the tab is hidden. ===== */
let _fxTimer=null;
// Render the active theme's particle layer, crossfading on change. The layer is fully UNLOADED
// (innerHTML emptied) whenever the page is hidden or reduced-motion is set — so a backgrounded
// tab does zero compositing work and holds no particle DOM. Restored on return.
function paintFX(){
  const fx=document.getElementById("fx"); if(!fx) return;
  if(document.hidden || _reduceMotion()){ clearTimeout(_fxTimer); if(fx.innerHTML!=="") fx.innerHTML=""; fx.style.opacity="0"; return; }
  let html=""; const g=FX[state.theme]; try{ const sc=(typeof SCENE!=="undefined"&&SCENE[state.theme])?SCENE[state.theme]():""; if(g) html=sc+g(); }catch(e){ html=""; }
  if(fx.innerHTML===html){ fx.style.opacity="1"; return; }
  clearTimeout(_fxTimer);
  const swap=()=>{ fx.innerHTML=html; requestAnimationFrame(()=>{ fx.style.opacity="1"; }); };
  if(!fx.innerHTML) swap();                                  // first paint / restored from empty: fade in
  else { fx.style.opacity="0"; _fxTimer=setTimeout(swap,360); } // theme change: dip-crossfade, no overlap
}
function applyTheme(){
  const t=THEME_KEYS.indexOf(state.theme)>=0?state.theme:"vibe";
  state.theme=t;
  const root=document.documentElement; if(root) root.setAttribute("data-theme",t);
  paintFX();
}
let lastView=null;
function render(){
  const app=document.getElementById("app");
  const sc={}; ["you","them"].forEach(s=>{ const el=document.getElementById("items-"+s); if(el) sc[s]=el.scrollTop; });
  const entering = state.view!==lastView;
  const body = state.view==="calc"?calcView(entering) : state.view==="history"?historyView() : state.view==="changes"?changesView() : state.view==="portfolio"?portfolioView() : state.view==="trends"?trendsView() : favoritesView();
  app.innerHTML = headerHTML()+`<div class="${entering?'view-in':''}" id="view">${body}</div>`+footerHTML();
  ["you","them"].forEach(s=>{ const el=document.getElementById("items-"+s); if(el&&sc[s]) el.scrollTop=sc[s]; });
  // gauge marker glides only when the verdict category changes
  const mark=document.getElementById("gmark");
  if(mark && mark.dataset.animate==="1"){ const pos=mark.dataset.pos; requestAnimationFrame(()=>{ mark.style.left=pos+"%"; }); }
  prevVerdictKey = window.__lastVerdictKey ?? prevVerdictKey;
  justAdded.you=justAdded.them=null;
  lastView=state.view; firstPaint=false;
}

function addItem(side,id){
  if(!BY_ID[id]) return;
  const arr = side==="you"?state.your:state.their;
  const ex=arr.find(x=>x.id===id);
  if(ex) ex.qty=clampQty(ex.qty+1); else arr.push({id,qty:1});
  justAdded[side]=id; state["q_"+side]=""; state["active_"+side]=-1;
  state.recents=[id, ...state.recents.filter(x=>x!==id)].slice(0,16); persist();
  render();
}
function changeQty(side,id,d){
  const arr=side==="you"?state.your:state.their, o=arr.find(x=>x.id===id);
  if(o){ o.qty=clampQty(o.qty+d); render(); }
}
function removeItem(side,id){
  if(side==="you") state.your=state.your.filter(x=>x.id!==id); else state.their=state.their.filter(x=>x.id!==id);
  render();
}
function toggleFav(id){
  if(!BY_ID[id]) return;
  state.favorites = state.favorites.includes(id) ? state.favorites.filter(x=>x!==id) : [...state.favorites,id];
  persist(); render();
}
function saveTrade(){
  const A=buildAnalysis(state.your,state.their); if(!A.hasTrade) return;
  state.history.unshift({id:Date.now(),time:new Date().toLocaleString(),
    your:state.your.map(x=>({...x})),their:state.their.map(x=>({...x})),
    sup:A.supreme.result,mm:A.mm2.result,comb:A.combined.result,combMag:A.combined.magnitude});
  state.history=state.history.slice(0,30); persist(); render();
}
function loadTrade(id){
  const h=state.history.find(x=>x.id===id); if(!h) return;
  state.your=h.your.map(x=>({...x})).filter(x=>BY_ID[x.id]);
  state.their=h.their.map(x=>({...x})).filter(x=>BY_ID[x.id]);
  state.view="calc"; prevVerdictKey=null; render();
}

/* ===========================================================================
   SHARE LINKS + LIVE CHANGE LOG
   Trade links carry item NAMES (human-readable, self-describing). The id is recoverable as
   slug(name); unresolved names fall back to a fuzzy lookup, so links survive catalogue changes.
   =========================================================================== */
const CHANGELOG_URL = DATA_URL ? DATA_URL.replace(/values\.json(\?.*)?$/i,"CHANGELOG.md") : "";
function b64urlEnc(str){ const b=btoa(String.fromCharCode(...new TextEncoder().encode(str))); return b.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64urlDec(b64){ b64=b64.replace(/-/g,"+").replace(/_/g,"/"); const pad=b64.length%4?"=".repeat(4-b64.length%4):""; const bin=atob(b64+pad); return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0))); }
function resolveItem(name){
  if(!name) return null;
  const id=slug(name); if(BY_ID[id]) return id;        // exact: id === slug(name)
  const q=norm(name); let best=null,bs=0;              // fallback: fuzzy by name/alias
  for(const it of ALL){ const h=HAY[it.id]; let s=0;
    if(h.name===q) s=5; else if(h.name.startsWith(q)||h.text.startsWith(q)) s=3; else if(h.text.includes(q)) s=2; else if(subseq(q,h.text)) s=1;
    if(s>bs){ bs=s; best=it.id; } }
  return bs>=2?best:null;
}
function encodeTrade(){
  const m=arr=>arr.map(o=>{ const it=BY_ID[o.id]; return [it?it.name:o.id, clampQty(o.qty)]; });
  return b64urlEnc(JSON.stringify({v:1,g:m(state.your),r:m(state.their)}));
}
function decodeTrade(token){
  try{
    const obj=JSON.parse(b64urlDec(token));
    if(!obj||obj.v!==1||!Array.isArray(obj.g)||!Array.isArray(obj.r)) return false;
    const rows=arr=>{ const seen={},out=[]; for(const p of arr){ if(!Array.isArray(p)) continue; const id=resolveItem(p[0]); if(!id) continue;
      const qty=clampQty(p[1]); if(seen[id]) seen[id].qty=clampQty(seen[id].qty+qty); else { const r={id,qty}; seen[id]=r; out.push(r); } } return out; };
    state.your=rows(obj.g); state.their=rows(obj.r);
    return state.your.length>0||state.their.length>0;
  }catch(e){ return false; }
}
function shareTrade(){
  if(!state.your.length && !state.their.length){ toast("Add items first, then share"); return; }
  const token=encodeTrade();
  try{ history.replaceState(null,"",location.pathname+location.search+"#t="+token); }catch(e){ try{ location.hash="t="+token; }catch(_){} }
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(()=>toast("\u2713 Trade link copied — paste to share")).catch(()=>{ try{ prompt("Copy this trade link:",url); }catch(_){} });
  else { try{ prompt("Copy this trade link:",url); }catch(_){ toast("Trade link is in the address bar"); } }
}
function loadFromHash(){
  try{ const m=(location.hash||"").match(/^#t=(.+)$/); if(m && decodeTrade(decodeURIComponent(m[1]))){ state.view="calc"; prevVerdictKey=null; return true; } }catch(e){}
  return false;
}
let CHANGES=[], CHANGES_STATE="idle", changesLoaded=false;
function parseChangelog(md){
  const out=[]; let cur=null;
  for(const raw of String(md).split(/\r?\n/)){
    const line=raw.trim();
    let m=line.match(/^##\s+(\d{4}-\d{2}-\d{2})\s*[—-]\s*(\d+)\s+change/i);
    if(m){ cur={date:m[1],count:+m[2],items:[]}; out.push(cur); continue; }
    if(!cur) continue;
    m=line.match(/^-\s+`([^`]+)`\s+\*\*([^*]+)\*\*:\s*(.*?)\s*(?:→|->)\s*(.*)$/);
    if(m) cur.items.push({id:m[1],kind:m[2].trim(),from:m[3].trim(),to:m[4].trim()});
  }
  return out;
}
async function loadChanges(){
  if(!CHANGELOG_URL){ CHANGES_STATE="disabled"; return; }
  if(changesLoaded) return;
  changesLoaded=true; CHANGES_STATE="loading"; if(state.view==="changes") render();
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
    const res=await fetch(CHANGELOG_URL,{signal:ctrl.signal,cache:"no-store"}); clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    CHANGES=parseChangelog(await res.text());
    CHANGES_STATE=CHANGES.length?"ok":"empty";
  }catch(e){ CHANGES_STATE="error"; changesLoaded=false; console.warn("[mm2] changelog unavailable:",e&&e.message); }
  if(state.view==="changes") render();
}

   TRENDS / MOVERS  —  surfaces the value direction the recommendation engine

/* ===========================================================================
   PORTFOLIO / INVENTORY  +  upgrade recommender. Deterministic, explainable

function recommendUpgrades(port,cat,mode){

  const V=reconciledSide(port).value;
  const owned=new Set(port.map(o=>o.id));
  const items=ALL.filter(it=> !it.placeholder && !owned.has(it.id) && REC_CATS.includes(it.category) && reconcile(it) && catMatch(it,cat))
    .map(it=>{ const sg=invSignals(it); return {it, s:sg, val:sg.val}; });   // values from reconcile() = calculator engine
  const REC_LO=0.84, REC_HI=1.06;   // realistic trades: target ~= your inventory value (never much more; never a lopsided giveaway)
  let combos = (V>0) ? buildCombos(items, V) : items.slice(0,40).map(c=>({items:[c], s:c.s, val:c.val}));
  for(const cb of combos){ cb.ratio = V>0? cb.val/V : 1; cb.conf = recConfidence(cb.s); }
  if(modeSize) combos = combos.filter(cb=> cb.items.length===modeSize);   // respect the selected Recommendation Mode
  const near = (V>0) ? combos.filter(cb=> cb.ratio>=REC_LO && cb.ratio<=REC_HI).length : combos.length;
  // Simplicity preference: with quality & value equal, fewer items win — so an equal-value single beats a
  // bundle. But a clearly stronger multi-item bundle still wins, so bundle size adapts to what trades best.
  const out={};

    let cand = (V>0) ? combos.filter(cb=> cb.ratio>=p.lo && cb.ratio<=p.hi) : combos.slice();

      .sort((a,b)=> b.sc-a.sc);

    // both new, so recommendations span item types (Godly, Ancient, Chroma, Set, Vintage, Legendary...) and
    // bundle sizes (1..4). Then fill by new size, then best-remaining — single-category filters still vary by size.
    const domCat=o=>{ let b=o.items[0]; for(const c of o.items) if(c.s.val>b.s.val) b=c; return b.it.category; };

  }

function moverData(){
  if(!HISTORY || !HISTORY.values) return null;
  const rows=[];
  for(const it of ALL){
    if(it.placeholder) continue;
    const m=histMetrics(it.id); if(!m) continue;
    const raw=HISTORY.values[it.id]; const pts=raw.filter(v=>v!=null&&isFinite(v));
    if(pts.length<2) continue;
    const first=pts[0], last=pts[pts.length-1];
    const chgPct = first>0 ? (last-first)/first*100 : 0;
    const snr = Math.min(1, Math.abs(m.normSlope)/(m.cv*0.6+0.05));
    const conf = Math.round(clamp100(45 + 35*snr + Math.min(15,(m.n-3)*3)));
    rows.push({it, m, chgPct, conf});
  }
  return rows;
}
function trendsView(){

  const risers=data.filter(r=>r.chgPct>=2).sort((a,b)=>b.chgPct-a.chgPct).slice(0,8);

  const row=(r)=>{
    const col = r.chgPct>0?"#34d399":r.chgPct<0?"#fb7185":"#8aa0c6";

/* ===========================================================================
   VALUE HISTORY  (sparklines from the auto-updater's history.json — graceful if absent)
   =========================================================================== */
let HISTORY=null, historyLoaded=false;
const HISTORY_URL = DATA_URL ? DATA_URL.replace(/values\.json(\?.*)?$/i,"history.json") : "";
async function loadHistory(){
  if(!HISTORY_URL||historyLoaded) return; historyLoaded=true;
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
    const res=await fetch(HISTORY_URL,{signal:ctrl.signal,cache:"no-store"}); clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const h=await res.json();
    if(h && h.values && typeof h.values==="object"){ HISTORY=h; render(); }
  }catch(e){ /* no history yet — sparklines simply don't render */ }
}
function sparkline(id){
  if(!HISTORY||!HISTORY.values) return "";
  const raw=HISTORY.values[id]; if(!Array.isArray(raw)) return "";
  const pts=raw.map((v,i)=>[i,v]).filter(p=>p[1]!=null && isFinite(p[1]));
  if(pts.length<2) return "";
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),lo=Math.min(...ys),hi=Math.max(...ys);
  const W=56,Hh=16,p=2;
  const sx=i=>x1===x0?0:((i-x0)/(x1-x0))*W;
  const sy=v=>hi===lo?Hh/2:Hh-p-((v-lo)/(hi-lo))*(Hh-p*2);
  const d=pts.map((q,k)=>`${k?"L":"M"}${sx(q[0]).toFixed(1)} ${sy(q[1]).toFixed(1)}`).join(" ");
  const first=ys[0],last=ys[ys.length-1], c=last>first?"#34d399":last<first?"#fb7185":"#8aa0c6";
  return `<svg class="spark" width="${W}" height="${Hh}" viewBox="0 0 ${W} ${Hh}" aria-hidden="true" title="value trend"><path d="${d}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${sx(x1).toFixed(1)}" cy="${sy(last).toFixed(1)}" r="1.7" fill="${c}"/></svg>`;
}

  else if(a==="share"){ shareTrade(); }
  else if(a==="card"){ openCardModal(); }
  else if(a==="reloadChanges"){ changesLoaded=false; loadChanges(); }
  else if(a==="qadd"){ addItem(b.dataset.side,b.dataset.id); }
  else if(a==="padd"){ const id=b.dataset.id; const ex=state.portfolio.find(o=>o.id===id); if(ex) ex.qty=clampQty(ex.qty+1); else state.portfolio.push({id,qty:1}); state.portQ=""; persist(); render(); }
  else if(a==="pqty"){ const id=b.dataset.id, d=parseInt(b.dataset.d,10); const o=state.portfolio.find(x=>x.id===id); if(o){ const nq=o.qty+d; if(nq<1) state.portfolio=state.portfolio.filter(x=>x.id!==id); else o.qty=clampQty(nq); persist(); render(); } }
  else if(a==="prm"){ state.portfolio=state.portfolio.filter(x=>x.id!==b.dataset.id); persist(); render(); }
  else if(a==="pcat"){ if(state.portCat!==b.dataset.c){ state.portCat=b.dataset.c; render(); } }
  else if(a==="psave"){ const nm=(state.portName||"").trim().replace(/\s+/g," ").slice(0,40);
    if(!state.portfolio.length){ toast("Add items to your inventory first"); }
    else { const name=nm||("Portfolio "+(state.savedPorts.length+1)); const items=state.portfolio.map(o=>({id:o.id,qty:o.qty}));
      const ex=state.savedPorts.find(x=>x.name.toLowerCase()===name.toLowerCase());
      if(ex){ ex.items=items; ex.ts=Date.now(); } else { state.savedPorts.unshift({id:Date.now(), name, items, ts:Date.now()}); state.savedPorts=state.savedPorts.slice(0,24); }
      state.portName=""; state.portConfirmDel=null; persist(); toast("\u2713 Saved \u201c"+name+"\u201d"); render(); } }
  else if(a==="pload"){ const x=state.savedPorts.find(z=>String(z.id)===b.dataset.id); if(x){ state.portfolio=x.items.filter(o=>BY_ID[o.id]).map(o=>({id:o.id,qty:clampQty(o.qty)})); state.portConfirmDel=null; persist(); toast("Loaded \u201c"+x.name+"\u201d"); render(); } }
  else if(a==="pdel"){ state.portConfirmDel = (String(state.portConfirmDel)===b.dataset.id)?null:b.dataset.id; render(); }
  else if(a==="pdelyes"){ const id=b.dataset.id; const x=state.savedPorts.find(z=>String(z.id)===id); state.savedPorts=state.savedPorts.filter(z=>String(z.id)!==id); state.portConfirmDel=null; persist(); if(x) toast("Deleted \u201c"+x.name+"\u201d"); render(); }
  else if(a==="pdelno"){ state.portConfirmDel=null; render(); }
  else if(a==="clearq"){ const side=b.dataset.side; state["q_"+side]=""; render(); const si=document.getElementById("si-"+side); if(si) si.focus(); }
  else if(a==="qty"){ changeQty(b.dataset.side,b.dataset.id,parseInt(b.dataset.d,10)); }
  else if(a==="rm"){ removeItem(b.dataset.side,b.dataset.id); }
  else if(a==="fav"){ toggleFav(b.dataset.id); }
  else if(a==="addFav"){ state.view="calc"; addItem(b.dataset.side,b.dataset.id); }
  else if(a==="addMulti"){ state.view="calc"; (b.dataset.ids||"").split(",").filter(Boolean).forEach(id=>addItem(b.dataset.side,id)); }
  else if(a==="swap"){ const t=state.your; state.your=state.their; state.their=t; const qy=state.q_you; state.q_you=state.q_them; state.q_them=qy; prevVerdictKey=null; render(); }
  else if(a==="clear"){ state.your=[]; state.their=[]; state.q_you=""; state.q_them=""; prevVerdictKey=null; render(); }
  else if(a==="save"){ saveTrade(); }
  else if(a==="load"){ loadTrade(parseInt(b.dataset.id,10)); }
  else if(a==="delTrade"){ state.history=state.history.filter(h=>h.id!==parseInt(b.dataset.id,10)); persist(); render(); }
});

/* trade-card modal lives outside #app, so handle its controls + Escape at the document level */
document.addEventListener("click",e=>{ const b=e.target&&e.target.closest&&e.target.closest("[data-cardact]"); if(!b) return;
  const a=b.dataset.cardact;
  if(a==="download") cardDownload(); else if(a==="share") cardShare(); else if(a==="copy") cardCopy(); else if(a==="close") closeCardModal();
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeCardModal(); });

/* ---------------- data loading: cache → embedded fallback → live refresh ---------------- */
const DATA_KEY="mm2.values";
function validDataset(d){
  if(!d||typeof d!=="object"||!Array.isArray(d.items)||d.items.length<100) return false;
  return d.items.every(o=> o && typeof o.name==="string" && typeof o.category==="string"
    && (o.supreme==null||(Number.isFinite(o.supreme)&&o.supreme>=0))
    && (o.mm2==null||(Number.isFinite(o.mm2)&&o.mm2>=0))
    && (o.demand==null||(o.demand>=1&&o.demand<=11))
    && (o.rarity==null||(o.rarity>=1&&o.rarity<=11)) );
}
function applyDataset(d,src){
  if(!validDataset(d)) return false;
  buildData(d.items.map(jsonToItem));
  DATA_DATE=d.updatedAt||DATA_DATE; DATA_SRC=src; DATA_LIVE=(src==="live");
  state.your=state.your.filter(o=>BY_ID[o.id]);
  state.their=state.their.filter(o=>BY_ID[o.id]);
  state.favorites=state.favorites.filter(id=>BY_ID[id]);
  return true;
}
function applyCachedData(){ try{ const c=store.get(DATA_KEY,null); if(c&&applyDataset(c,"cache")) return true; }catch(e){} return false; }
async function refreshData(){
  if(!DATA_URL) return;                       // embedded/offline-only mode
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
    const res=await fetch(DATA_URL,{signal:ctrl.signal,cache:"no-store"}); clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const d=await res.json();
    if(!validDataset(d)){ console.warn("[mm2] values.json failed validation — keeping current data"); return; }
    const prevDate=DATA_DATE;
    if(applyDataset(d,"live")){
      try{ store.set(DATA_KEY,d); }catch(e){}
      if(!state.your.length && !state.their.length) loadFromHash();   // resolve shared items now in live data
      render();
      if(d.updatedAt && d.updatedAt!==prevDate) toast("✓ Values updated — "+d.updatedAt);
    }
  }catch(e){ console.warn("[mm2] value refresh unavailable, using cached/embedded:", e&&e.message); }
}
let toastTimer=null;
function toast(msg){
  try{
    let t=document.getElementById("toast");
    if(!t){ if(!document.createElement) return; t=document.createElement("div"); t.id="toast"; t.className="toast"; (document.body||document.documentElement).appendChild(t); }
    t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.classList.remove("show"); },3200);
  }catch(e){}
}

function __boot(){
  applyCachedData();   // instant freshness from last good pull
  loadFromHash();      // shared trade from URL (#t=...) if present
  applyTheme();        // theme attribute + FX layer
  render();            // build #app
  refreshData();       // background: latest values if configured
  loadHistory();       // background: sparkline history (graceful if absent)
  __lzGuard();         // soft "unauthorized copy" banner on non-allowlisted hosts
}
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded",__boot,{once:true}); } else { __boot(); }
try{ document.addEventListener("visibilitychange", paintFX); }catch(e){}  // unload the FX particle layer for backgrounded tabs
try{ const _mq=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)"); if(_mq&&_mq.addEventListener) _mq.addEventListener("change",applyTheme); }catch(e){}         // soft "unauthorized copy" banner on non-allowlisted hosts
try { window.__lz = { wm: __LZ_WM, build: __LZ_BUILD, owner: "Lifenz", src: "youtube.com/@wyalife · discord.gg/resurrect" }; } catch (e) {}
// Service worker intentionally DISABLED. Proactively remove any previously-installed worker and
// clear its caches so a stale/broken cached page can never get "stuck" again. Updates now show
// immediately on a normal refresh.
try {
  if (typeof navigator !== "undefined" && navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
    navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
  }
  if (typeof caches !== "undefined" && caches.keys) {
    caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }).catch(function(){});
  }
} catch (e) {}
