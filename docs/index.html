<style>
  :root{
    --bg:#0a0e1a; --card:rgba(19,26,43,.66); --card2:rgba(24,32,52,.6);
    --line:#1f2940; --line2:#2a3750; --text:#e8edf6; --muted:#76849f; --muted2:#97a4bf;
    --violet:#a78bfa; --violet2:#8b5cf6; --cyan:#34d3ee;
    --win:#34d399; --fair:#fbbf24; --lose:#fb7185;
    --r-sm:9px; --r-md:12px; --r-lg:15px; --r-xl:18px;
    --fast:.15s; --slow:.45s; --ease:cubic-bezier(.22,.7,.3,1);
    --shadow:0 8px 24px -12px rgba(0,0,0,.6);
    --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --round:"SF Pro Rounded",ui-rounded,"Segoe UI",var(--font);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(900px 460px at 10% -10%,rgba(124,58,237,.14),transparent 55%),radial-gradient(760px 420px at 98% 0%,rgba(34,184,214,.09),transparent 52%),var(--bg);
    color:var(--text);min-height:100vh;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;background-image:radial-gradient(rgba(124,140,180,.05) 1px,transparent 1px);background-size:24px 24px}
  .glow{position:fixed;border-radius:9999px;filter:blur(90px);pointer-events:none;z-index:0;opacity:.4}
  .glow1{top:-120px;left:-90px;width:300px;height:300px;background:rgba(124,58,237,.16)}
  .glow2{bottom:-140px;right:-90px;width:320px;height:320px;background:rgba(34,184,214,.11)}
  #app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:14px 16px 36px}

  .row{display:flex;align-items:center}.between{justify-content:space-between}.center{justify-content:center}
  .wrap{flex-wrap:wrap}.col{flex-direction:column}.min0{min-width:0}
  .gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
  .mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mt2{margin-top:2px}.mt4{margin-top:4px}.mt8{margin-top:8px}
  .b{font-weight:700;color:#f3f6fc}.sb{font-weight:600}.sm{font-size:13px}.xs{font-size:11px}
  .r{text-align:right}.tab-num{font-variant-numeric:tabular-nums}
  .mut{color:var(--muted)}.mut2{color:var(--muted2)}.dim{color:#4a5773}
  .ic{display:inline-block;vertical-align:middle;flex:none}
  .ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* header */
  .hdr{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8b5cf6,#ec4899 52%,#22d3ee);box-shadow:0 8px 20px rgba(139,92,246,.36);position:relative;overflow:hidden}
  .logo::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.4),transparent 45%);opacity:.6}
  .title{font-family:var(--round);font-size:18px;font-weight:800;letter-spacing:-.01em;margin:0;line-height:1.05}
  .tagline{font-size:11px;color:var(--muted2);margin:3px 0 0;display:flex;align-items:center;gap:5px}
  .brandmark{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;font-weight:900;letter-spacing:.5px}
  .ftr-social{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-top:2px}
  .ftr-social a{display:inline-flex;align-items:center;gap:6px;color:var(--muted2);text-decoration:none;font-weight:600;transition:color .15s var(--ease)}
  .ftr-social a:hover{color:#c4b5fd}
  .ftr-copy{color:var(--muted);opacity:.85}
  .tabs{display:flex;gap:3px;background:rgba(14,19,32,.7);border:1px solid var(--line);border-radius:12px;padding:3px;box-shadow:var(--shadow)}
  .tab{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;background:transparent;border:none;color:var(--muted2);cursor:pointer;transition:color var(--fast),background var(--fast);font-family:var(--font)}
  .tab:hover{color:#dce4f1}.tab-on{background:rgba(124,58,237,.16);color:#f3f6fc;box-shadow:inset 0 0 0 1px rgba(124,58,237,.3)}
  .tab-n{font-size:10px;padding:1px 6px;border-radius:9999px;background:#313e5a;color:#cdd6e8}
  .tab-on .tab-n{background:rgba(124,58,237,.45);color:#fff}

  .card{border:1px solid var(--line);background:var(--card);backdrop-filter:blur(10px);border-radius:var(--r-lg);padding:13px;box-shadow:var(--shadow)}
  .grid2{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:760px){.grid2{grid-template-columns:1fr 1fr}}
  .dot{width:8px;height:8px;border-radius:9999px;display:inline-block;flex:none}
  .subt{font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}

  /* panel */
  .panel{display:flex;flex-direction:column}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .search-wrap{position:relative}
  .search-box{display:flex;align-items:center;gap:8px;border-radius:var(--r-md);padding:8px 11px;background:rgba(12,18,31,.7);border:1px solid var(--line2);transition:border-color var(--fast),box-shadow var(--fast)}
  .search-box:focus-within{border-color:var(--violet2);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
  .search-input{flex:1;background:transparent;border:none;outline:none;color:#f3f6fc;font-size:13.5px;min-width:0;font-family:var(--font)}
  .search-input::placeholder{color:var(--muted)}
  .x-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;display:flex}.x-btn:hover{color:#cdd6e8}
  .dropdown{position:absolute;z-index:40;margin-top:5px;width:100%;border:1px solid var(--line2);border-radius:var(--r-md);background:#0c1220;box-shadow:0 24px 60px rgba(0,0,0,.62);overflow:hidden}
  .dd-list{max-height:268px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  .dd-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 11px;background:none;border:none;cursor:pointer;text-align:left;color:var(--text);border-left:2px solid transparent;transition:background var(--fast)}
  .dd-item:hover,.dd-item.active{background:rgba(124,58,237,.14);border-left-color:var(--violet)}
  .dd-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-d{font-size:9.5px;color:var(--muted);font-weight:700}
  .dd-val{font-size:11px;font-variant-numeric:tabular-nums;flex:none;white-space:nowrap}
