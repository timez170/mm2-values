<style>
  :root{
    --bg:#0a0e1a; --card:rgba(19,26,43,.66); --card2:rgba(24,32,52,.6);
    --line:#1f2940; --line2:#2a3750; --text:#e8edf6; --muted:#76849f; --muted2:#97a4bf;
    --violet:#a78bfa; --violet2:#8b5cf6; --cyan:#34d3ee;
    --win:#34d399; --fair:#fbbf24; --lose:#fb7185;
    --r-sm:9px; --r-md:12px; --r-lg:15px; --r-xl:18px;
    --fast:.15s; --slow:.45s; --ease:cubic-bezier(.22,.7,.3,1);
    --shadow:0 8px 24px -12px rgba(0,0,0,.6);
    --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    --round:"SF Pro Rounded",ui-rounded,"Segoe UI",var(--font);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:radial-gradient(900px 460px at 10% -10%,rgba(124,58,237,.14),transparent 55%),radial-gradient(760px 420px at 98% 0%,rgba(34,184,214,.09),transparent 52%),var(--bg);
    color:var(--text);min-height:100vh;font-family:var(--font);-webkit-font-smoothing:antialiased;font-size:14px}
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;background-image:radial-gradient(rgba(124,140,180,.05) 1px,transparent 1px);background-size:24px 24px}
  .glow{position:fixed;border-radius:9999px;filter:blur(90px);pointer-events:none;z-index:0;opacity:.4}
  .glow1{top:-120px;left:-90px;width:300px;height:300px;background:rgba(124,58,237,.16)}
  .glow2{bottom:-140px;right:-90px;width:320px;height:320px;background:rgba(34,184,214,.11)}
  #app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:14px 16px 36px}

  .row{display:flex;align-items:center}.between{justify-content:space-between}.center{justify-content:center}
  .wrap{flex-wrap:wrap}.col{flex-direction:column}.min0{min-width:0}
  .gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
  .mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mt2{margin-top:2px}.mt4{margin-top:4px}.mt8{margin-top:8px}
  .b{font-weight:700;color:#f3f6fc}.sb{font-weight:600}.sm{font-size:13px}.xs{font-size:11px}
  .r{text-align:right}.tab-num{font-variant-numeric:tabular-nums}
  .mut{color:var(--muted)}.mut2{color:var(--muted2)}.dim{color:#4a5773}
  .ic{display:inline-block;vertical-align:middle;flex:none}
  .ell{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* header */
  .hdr{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:11px}
  .logo{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#8b5cf6,#ec4899 52%,#22d3ee);box-shadow:0 8px 20px rgba(139,92,246,.36);position:relative;overflow:hidden}
  .logo::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,.4),transparent 45%);opacity:.6}
  .title{font-family:var(--round);font-size:18px;font-weight:800;letter-spacing:-.01em;margin:0;line-height:1.05}
  .tagline{font-size:11px;color:var(--muted2);margin:3px 0 0;display:flex;align-items:center;gap:5px}
  .tabs{display:flex;gap:3px;background:rgba(14,19,32,.7);border:1px solid var(--line);border-radius:12px;padding:3px;box-shadow:var(--shadow)}
  .tab{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:9px;font-size:13px;font-weight:600;background:transparent;border:none;color:var(--muted2);cursor:pointer;transition:color var(--fast),background var(--fast);font-family:var(--font)}
  .tab:hover{color:#dce4f1}.tab-on{background:rgba(124,58,237,.16);color:#f3f6fc;box-shadow:inset 0 0 0 1px rgba(124,58,237,.3)}
  .tab-n{font-size:10px;padding:1px 6px;border-radius:9999px;background:#313e5a;color:#cdd6e8}
  .tab-on .tab-n{background:rgba(124,58,237,.45);color:#fff}

  .card{border:1px solid var(--line);background:var(--card);backdrop-filter:blur(10px);border-radius:var(--r-lg);padding:13px;box-shadow:var(--shadow)}
  .grid2{display:grid;grid-template-columns:1fr;gap:11px}
  @media(min-width:760px){.grid2{grid-template-columns:1fr 1fr}}
  .dot{width:8px;height:8px;border-radius:9999px;display:inline-block;flex:none}
  .subt{font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}

  /* panel */
  .panel{display:flex;flex-direction:column}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .search-wrap{position:relative}
  .search-box{display:flex;align-items:center;gap:8px;border-radius:var(--r-md);padding:8px 11px;background:rgba(12,18,31,.7);border:1px solid var(--line2);transition:border-color var(--fast),box-shadow var(--fast)}
  .search-box:focus-within{border-color:var(--violet2);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
  .search-input{flex:1;background:transparent;border:none;outline:none;color:#f3f6fc;font-size:13.5px;min-width:0;font-family:var(--font)}
  .search-input::placeholder{color:var(--muted)}
  .x-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:0;display:flex}.x-btn:hover{color:#cdd6e8}
  .dropdown{position:absolute;z-index:40;margin-top:5px;width:100%;border:1px solid var(--line2);border-radius:var(--r-md);background:#0c1220;box-shadow:0 24px 60px rgba(0,0,0,.62);overflow:hidden}
  .dd-list{max-height:268px;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  .dd-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 11px;background:none;border:none;cursor:pointer;text-align:left;color:var(--text);border-left:2px solid transparent;transition:background var(--fast)}
  .dd-item:hover,.dd-item.active{background:rgba(124,58,237,.14);border-left-color:var(--violet)}
  .dd-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dd-d{font-size:9.5px;color:var(--muted);font-weight:700}
  .dd-val{font-size:11px;font-variant-numeric:tabular-nums;flex:none;white-space:nowrap}
  .dd-empty{padding:13px;font-size:12.5px;color:var(--muted2);display:flex;align-items:center;gap:8px}
  .dd-hint{padding:5px 11px;font-size:9.5px;color:var(--muted);border-top:1px solid var(--line);display:flex;gap:10px;background:rgba(255,255,255,.012)}
  kbd{font-family:var(--font);font-size:9px;background:#1b2640;border:1px solid #313e5a;border-bottom-width:2px;border-radius:4px;padding:0 4px;color:#cdd6e8}

  /* compact filter row: category + sort */
  .filt{display:flex;gap:7px;margin-top:8px}
  .cat-sel,.sort{font-size:12px;color:#dce4f1;background:rgba(12,18,31,.7);border:1px solid var(--line2);border-radius:9px;padding:6px 9px;cursor:pointer;font-family:var(--font);transition:border-color var(--fast)}
  .cat-sel{flex:1;font-weight:600}.cat-sel:hover,.sort:hover{border-color:#384664}
  .sort{flex:none;color:var(--muted2)}

  /* quick-add (shown when a side is empty) */
  .qa{margin-top:11px}
  .qa-h{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);display:flex;align-items:center;gap:6px;margin-bottom:8px}
  .qa-grid{display:flex;flex-wrap:wrap;gap:6px}
  .qa-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:9999px;border:1px solid var(--line2);background:rgba(26,34,56,.5);color:var(--text);cursor:pointer;transition:all var(--fast);font-family:var(--font);max-width:100%}

function valueOf(it,site,bound="mid"){
  if(!it||it.placeholder) return null;
  const base=it[site]; if(base==null) return null;
  if(bound==="mid"||!it.range) return base;
  const [lo,hi]=it.range;
  if(site==="supreme") return bound==="lo"?lo:hi;
  // Range is published on Supreme's scale — scale mm2 proportionally.
  const sMid=it.supreme!=null?it.supreme:base, ratio=(bound==="lo"?lo:hi)/(sMid||1);
  return base*ratio;
}
function sideTotal(items,site,bound="mid"){
  let total=0; const missing=[];
  for(const {id,qty} of items){
    const it=BY_ID[id]; if(!it) continue;
    const q=clampQty(qty);
    if(it.placeholder){ missing.push(it); continue; }
    const v=valueOf(it,site,bound); if(v==null){ missing.push(it); continue; }
    total += v*q;
  }
  return {total,missing};
}
function combinedVal(it,bound="mid"){
  if(!it||it.placeholder) return null;
  const a=valueOf(it,"supreme",bound), b=valueOf(it,"mm2",bound);
  const arr=[a,b].filter(x=>x!=null);
  return arr.length? arr.reduce((s,x)=>s+x,0)/arr.length : null;
}
function combinedSide(items,bound="mid"){
  let total=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it) continue; const v=combinedVal(it,bound); if(v!=null) total+=v*clampQty(qty); }
  return total;
}
function verdict(give,receive){
  if(give===0 && receive===0) return {result:"none",magnitude:"No items",diff:0,pct:0};
  const diff=receive-give, base=give>0?give:receive, pct=(diff/base)*100, a=Math.abs(pct);
  let result,magnitude;
  if(a<=FAIR){result="fair";magnitude="Fair Trade";}
  else if(diff>0){result="win";magnitude=a>BIG?"Big Win":"Small Win";}
  else {result="lose";magnitude=a>BIG?"Big Loss":"Small Loss";}
  return {result,magnitude,diff,pct};
}
// value-weighted average demand for a side (items with demand only)
function sideDemand(items){
  let wsum=0,w=0;
  for(const {id,qty} of items){ const it=BY_ID[id]; if(!it||it.demand==null) continue;
    const v=combinedVal(it)||1, q=clampQty(qty); wsum+=it.demand*v*q; w+=v*q; }
  return w>0? wsum/w : null;
}
// suggestion to reach a Fair trade (approximate, on combined values)
function balanceSuggestion(give,receive){
  if(give===0 && receive===0) return null;
  const v=verdict(give,receive);
  if(v.result==="fair"||v.result==="none") return {fair:true};
  if(v.diff<0){ const target=give*(1-FAIR/100); return {fair:false,side:"their",add:Math.max(1,Math.round(target-receive))}; }
  const target=receive*(1-FAIR/100); return {fair:false,side:"your",add:Math.max(1,Math.round(target-give))};
}
function intel(your,their){
  const gD=sideDemand(your), rD=sideDemand(their), notes=[];
  if(rD!=null){
    if(rD>=5) notes.push({s:"up",t:`You're receiving high-demand items (avg ${rD.toFixed(1)}/10) — easy to re-trade later.`});
    else if(rD>=3) notes.push({s:"flat",t:`Items you'd receive have moderate demand (avg ${rD.toFixed(1)}/10) — reasonable to move on.`});
    else notes.push({s:"down",t:`Items you'd receive are low-demand (avg ${rD.toFixed(1)}/10) — they can be slow to re-trade even at fair value.`});
  }
  const recvCaution=[],recvUp=[],giveOverpaid=[];
  their.forEach(({id})=>{ const it=BY_ID[id]; if(!it||!it.trend) return; const s=TREND_SENT[it.trend];
    if(it.trend==="Overpaid For") recvCaution.push(it.name+" (pulls above value)");
    else if(s==="down") recvCaution.push(it.name);
    else if(s==="up") recvUp.push(it.name); });
  your.forEach(({id})=>{ const it=BY_ID[id]; if(it&&it.trend==="Overpaid For") giveOverpaid.push(it.name); });
  if(recvUp.length) notes.push({s:"up",t:`Rising / improving on your side: ${[...new Set(recvUp)].join(", ")} — potential upside.`});
  if(recvCaution.length) notes.push({s:"down",t:`Watch on items you'd receive: ${[...new Set(recvCaution)].join(", ")} — value may be soft or volatile.`});
  if(giveOverpaid.length) notes.push({s:"up",t:`Good to offload: ${[...new Set(giveOverpaid)].join(", ")} currently pull above listed value.`});
  return {gD,rD,notes};
}
function buildAnalysis(your,their){
  const hasTrade = your.length>0 && their.length>0;
  const sy=sideTotal(your,"supreme"), st=sideTotal(their,"supreme");
  const my=sideTotal(your,"mm2"), mt=sideTotal(their,"mm2");
  const supreme={...verdict(sy.total,st.total),you:sy.total,them:st.total,missY:sy.missing,missT:st.missing};
  const mm2={...verdict(my.total,mt.total),you:my.total,them:mt.total,missY:my.missing,missT:mt.missing};
  const cy=combinedSide(your), ct=combinedSide(their);
  const combined={...verdict(cy,ct),you:cy,them:ct};
  const agree = supreme.result===mm2.result;
  // ranged best / worst case (combined)
  const giveLo=combinedSide(your,"lo"), giveHi=combinedSide(your,"hi");
  const getLo=combinedSide(their,"lo"), getHi=combinedSide(their,"hi");
  const best=verdict(giveLo,getHi), worst=verdict(giveHi,getLo);
  const hasRange=[...your,...their].some(o=>BY_ID[o.id]&&BY_ID[o.id].range);
  // divergences
  const ids=new Set([...your,...their].map(x=>x.id)); const divergences=[];
  ids.forEach(id=>{ const it=BY_ID[id]; if(!isDivergent(it)) return;
    const rel=(Math.abs(it.supreme-it.mm2)/((it.supreme+it.mm2)/2))*100;
    divergences.push({it,rel,higher: it.supreme>it.mm2?"Supreme":"MM2Values"}); });
  divergences.sort((a,b)=>b.rel-a.rel);
  // breakdown lines with value share
  const lines=[];
  const push=(arr,side,total)=>arr.forEach(({id,qty})=>{ const it=BY_ID[id]; if(!it) return;
    const cv=combinedVal(it), q=clampQty(qty); lines.push({it,qty:q,side,share: total>0&&cv!=null?(cv*q/total*100):0}); });
  push(your,"you",cy); push(their,"them",ct);
  const balance=hasTrade?balanceSuggestion(cy,ct):null;
  const intelData=hasTrade?intel(your,their):null;
  let conf="Medium";
  if(hasTrade){ let score=0; if(agree) score++; if(intelData.rD!=null&&intelData.rD>=4) score++;
    if(intelData.notes.some(n=>n.s==="down")) score--;
    if(supreme.missY.length||supreme.missT.length||mm2.missY.length||mm2.missT.length) score--;
    conf = score>=2?"High":score<=-1?"Low":"Medium"; }
  return {hasTrade,supreme,mm2,combined,agree,divergences,lines,intel:intelData,conf,
    range:{has:hasRange,best,worst}, balance};
}

// POPULAR (curated quick-access list) is computed in buildData() from POPULAR_NAMES.
const VIRTUAL={ "Popular":i=>POPULAR.includes(i.id), "High Demand":i=>(i.demand||0)>=5 };
function inCat(i,cat){ if(cat==="All") return true; if(VIRTUAL[cat]) return VIRTUAL[cat](i); return i.category===cat; }
function sortKey(it){ return state.sort==="demand"?(it.demand??-1): state.sort==="rarity"?(it.rarity??-1): (it.supreme??it.mm2??0); }
function searchItems(side){
  const q=norm(state["q_"+side]||""), cat=state["cat_"+side]||"All";
  let pool=ALL.filter(i=>inCat(i,cat));
  if(q){
    const scored=[];
    for(const it of pool){ const h=HAY[it.id]; let s=0;
      if(h.name.startsWith(q)) s=4; else if(h.text.startsWith(q)) s=3;
      else if(h.text.includes(q)) s=2; else if(subseq(q,h.text)) s=1;
      if(s>0) scored.push([s,it]); }
    scored.sort((a,b)=> b[0]-a[0] || sortKey(b[1])-sortKey(a[1]));
    return scored.map(x=>x[1]).slice(0,12);
  }
  // empty query → browse: Popular by default, High Demand by demand, else tier by chosen sort
  if(cat==="All"||cat==="Popular") return POPULAR.map(id=>BY_ID[id]).filter(Boolean);
  if(cat==="High Demand") return pool.slice().sort((a,b)=>(b.demand||0)-(a.demand||0)).slice(0,50);
  return pool.slice().sort((a,b)=> sortKey(b)-sortKey(a)).slice(0,50);
}

/* ===========================================================================
   SHARE LINKS + LIVE CHANGE LOG
   Trade links carry item NAMES (human-readable, self-describing). The id is recoverable as
   slug(name); unresolved names fall back to a fuzzy lookup, so links survive catalogue changes.
   =========================================================================== */
const CHANGELOG_URL = DATA_URL ? DATA_URL.replace(/values\.json(\?.*)?$/i,"CHANGELOG.md") : "";
function b64urlEnc(str){ const b=btoa(String.fromCharCode(...new TextEncoder().encode(str))); return b.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function b64urlDec(b64){ b64=b64.replace(/-/g,"+").replace(/_/g,"/"); const pad=b64.length%4?"=".repeat(4-b64.length%4):""; const bin=atob(b64+pad); return new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0))); }
function resolveItem(name){
  if(!name) return null;
  const id=slug(name); if(BY_ID[id]) return id;        // exact: id === slug(name)
  const q=norm(name); let best=null,bs=0;              // fallback: fuzzy by name/alias
  for(const it of ALL){ const h=HAY[it.id]; let s=0;
    if(h.name===q) s=5; else if(h.name.startsWith(q)||h.text.startsWith(q)) s=3; else if(h.text.includes(q)) s=2; else if(subseq(q,h.text)) s=1;
    if(s>bs){ bs=s; best=it.id; } }
  return bs>=2?best:null;
}
function encodeTrade(){
  const m=arr=>arr.map(o=>{ const it=BY_ID[o.id]; return [it?it.name:o.id, clampQty(o.qty)]; });
  return b64urlEnc(JSON.stringify({v:1,g:m(state.your),r:m(state.their)}));
}
function decodeTrade(token){
  try{
    const obj=JSON.parse(b64urlDec(token));
    if(!obj||obj.v!==1||!Array.isArray(obj.g)||!Array.isArray(obj.r)) return false;
    const rows=arr=>{ const seen={},out=[]; for(const p of arr){ if(!Array.isArray(p)) continue; const id=resolveItem(p[0]); if(!id) continue;
      const qty=clampQty(p[1]); if(seen[id]) seen[id].qty=clampQty(seen[id].qty+qty); else { const r={id,qty}; seen[id]=r; out.push(r); } } return out; };
    state.your=rows(obj.g); state.their=rows(obj.r);
    return state.your.length>0||state.their.length>0;
  }catch(e){ return false; }
}
function shareTrade(){
  if(!state.your.length && !state.their.length){ toast("Add items first, then share"); return; }
  const token=encodeTrade();
  try{ history.replaceState(null,"",location.pathname+location.search+"#t="+token); }catch(e){ try{ location.hash="t="+token; }catch(_){} }
  const url=location.href;
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(()=>toast("\u2713 Trade link copied — paste to share")).catch(()=>{ try{ prompt("Copy this trade link:",url); }catch(_){} });
  else { try{ prompt("Copy this trade link:",url); }catch(_){ toast("Trade link is in the address bar"); } }
}
function loadFromHash(){

}
let CHANGES=[], CHANGES_STATE="idle", changesLoaded=false;
function parseChangelog(md){
  const out=[]; let cur=null;
  for(const raw of String(md).split(/\r?\n/)){
    const line=raw.trim();
    let m=line.match(/^##\s+(\d{4}-\d{2}-\d{2})\s*[—-]\s*(\d+)\s+change/i);
    if(m){ cur={date:m[1],count:+m[2],items:[]}; out.push(cur); continue; }
    if(!cur) continue;
    m=line.match(/^-\s+`([^`]+)`\s+\*\*([^*]+)\*\*:\s*(.*?)\s*(?:→|->)\s*(.*)$/);
    if(m) cur.items.push({id:m[1],kind:m[2].trim(),from:m[3].trim(),to:m[4].trim()});
  }
  return out;
}
async function loadChanges(){

/* ===========================================================================
   VALUE HISTORY  (sparklines from the auto-updater's history.json — graceful if absent)
   =========================================================================== */
let HISTORY=null, historyLoaded=false;
const HISTORY_URL = DATA_URL ? DATA_URL.replace(/values\.json(\?.*)?$/i,"history.json") : "";
async function loadHistory(){
  if(!HISTORY_URL||historyLoaded) return; historyLoaded=true;
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
    const res=await fetch(HISTORY_URL,{signal:ctrl.signal,cache:"no-store"}); clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const h=await res.json();
    if(h && h.values && typeof h.values==="object"){ HISTORY=h; if(state.view==="calc") render(); }
  }catch(e){ /* no history yet — sparklines simply don't render */ }
}
function sparkline(id){
  if(!HISTORY||!HISTORY.values) return "";
  const raw=HISTORY.values[id]; if(!Array.isArray(raw)) return "";
  const pts=raw.map((v,i)=>[i,v]).filter(p=>p[1]!=null && isFinite(p[1]));
  if(pts.length<2) return "";
  const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),lo=Math.min(...ys),hi=Math.max(...ys);
  const W=56,Hh=16,p=2;
  const sx=i=>x1===x0?0:((i-x0)/(x1-x0))*W;
  const sy=v=>hi===lo?Hh/2:Hh-p-((v-lo)/(hi-lo))*(Hh-p*2);
  const d=pts.map((q,k)=>`${k?"L":"M"}${sx(q[0]).toFixed(1)} ${sy(q[1]).toFixed(1)}`).join(" ");
  const first=ys[0],last=ys[ys.length-1], c=last>first?"#34d399":last<first?"#fb7185":"#8aa0c6";
  return `<svg class="spark" width="${W}" height="${Hh}" viewBox="0 0 ${W} ${Hh}" aria-hidden="true" title="value trend"><path d="${d}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${sx(x1).toFixed(1)}" cy="${sy(last).toFixed(1)}" r="1.7" fill="${c}"/></svg>`;
}

/* ===========================================================================
   TRADE CARD  (shareable branded PNG via Canvas — no external image assets, no CORS)
   pure model (testable) + a canvas renderer + a preview modal
   =========================================================================== */
function tradeCardModel(){
  const A=buildAnalysis(state.your,state.their);
  const side=arr=>arr.map(o=>{ const it=BY_ID[o.id]; if(!it) return null;
    return {name:it.name,cat:it.category,qty:clampQty(o.qty),supreme:it.supreme,mm2:it.mm2,combined:combinedVal(it)}; }).filter(Boolean);
  const r=RES[A.combined.result]||RES.none;
  return { complete: state.your.length>0 && state.their.length>0,
    give:side(state.your), get:side(state.their),
    verdict:{label:r.label,color:r.t,bg:r.b,bd:r.bd,magnitude:A.combined.magnitude,pct:A.combined.pct,result:A.combined.result},
    totals:{cgive:A.combined.you,cget:A.combined.them,sgive:A.supreme.you,sget:A.supreme.them,mgive:A.mm2.you,mget:A.mm2.them},
    conf:A.conf, date:DATA_DATE, live:DATA_LIVE };
}
function drawTradeCard(m){
  const cv=document.createElement("canvas"); if(!cv||!cv.getContext) return null;
  const W=1000, PAD=44, COLW=(W-PAD*3)/2, rowH=46, headH=176, totH=132, footH=78;
  const rows=Math.max(m.give.length,m.get.length,3), listH=rows*rowH, H=headH+listH+totH+footH;
  const S=2; cv.width=W*S; cv.height=H*S;
  const x=cv.getContext("2d"); if(!x) return null; x.scale(S,S); x.textBaseline="alphabetic";
  const F=(w,s,c)=>{ x.font=`${w} ${s}px Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif`; x.fillStyle=c; };
  const rr=(X,Y,w,h,r)=>{ x.beginPath(); x.moveTo(X+r,Y); x.arcTo(X+w,Y,X+w,Y+h,r); x.arcTo(X+w,Y+h,X,Y+h,r); x.arcTo(X,Y+h,X,Y,r); x.arcTo(X,Y,X+w,Y,r); x.closePath(); };
  const ell=(s,max)=>{ if(x.measureText(s).width<=max) return s; let t=String(s); while(t.length>1 && x.measureText(t+"…").width>max) t=t.slice(0,-1); return t+"…"; };
  // background
  const bg=x.createLinearGradient(0,0,W,H); bg.addColorStop(0,"#0a0f1e"); bg.addColorStop(1,"#0d1426");
  x.fillStyle=bg; x.fillRect(0,0,W,H);
  const grad=x.createLinearGradient(0,0,W,0); grad.addColorStop(0,"#7c3aed"); grad.addColorStop(.5,"#a855f7"); grad.addColorStop(1,"#ec4899");
  x.fillStyle=grad; x.fillRect(0,0,W,6);
  // brand
  x.save(); x.translate(PAD,28); x.scale(1.3,1.3); const gem=new Path2D("M6 3h12l4 6-10 12L2 9z");
  x.strokeStyle="#c4b5fd"; x.lineWidth=2; x.lineJoin="round"; x.stroke(gem);
  x.beginPath(); x.moveTo(2,9); x.lineTo(22,9); x.moveTo(12,3); x.lineTo(8,9); x.lineTo(12,21); x.lineTo(16,9); x.closePath(); x.stroke(); x.restore();
  F("800",26,"#f4f1ff"); x.fillText("MM2 Trade Calculator",PAD+46,50);
  F("600",13.5,"#8aa0c6"); x.fillText("Lifenz · dual-source value · @wyalife",PAD+46,72);
  // verdict pill
  const vlabel=m.complete?m.verdict.magnitude:"Incomplete trade";
  const vpct=m.complete?`${m.verdict.pct>=0?"+":"−"}${Math.abs(m.verdict.pct).toFixed(1)}%`:"";
  F("800",20,"#fff"); const vw=x.measureText(vlabel).width; F("700",15,"#fff"); const pw=x.measureText(vpct).width;
  const pillW=Math.max(vw,pw)+48, pillX=W-PAD-pillW, pillY=26, pillH=64;
  x.fillStyle=m.verdict.bg; rr(pillX,pillY,pillW,pillH,14); x.fill();
  x.strokeStyle=m.verdict.bd; x.lineWidth=1.5; rr(pillX,pillY,pillW,pillH,14); x.stroke();
  x.textAlign="center"; F("800",20,m.verdict.color); x.fillText(vlabel,pillX+pillW/2,pillY+ (vpct?27:38));
  if(vpct){ F("700",15,m.verdict.color); x.fillText(vpct,pillX+pillW/2,pillY+50); } x.textAlign="left";
  // column headers
  const colY=headH-44, giveX=PAD, getX=PAD*2+COLW;
  F("800",13,"#a78bfa"); x.fillText("YOU GIVE",giveX+14,colY);
  F("800",13,"#34d3ee"); x.fillText("YOU GET",getX+14,colY);
  // columns
  const drawCol=(items,cx,accent)=>{
    rr(cx,headH-28,COLW,listH+8,14); x.fillStyle="rgba(255,255,255,.03)"; x.fill();
    x.strokeStyle=accent+"33"; x.lineWidth=1.2; rr(cx,headH-28,COLW,listH+8,14); x.stroke();
    if(!items.length){ F("500",14,"#5a6a88"); x.fillText("— empty —",cx+16,headH-28+rowH/2+5); return; }
    items.forEach((it,i)=>{
      const ry=headH-28+i*rowH+rowH/2;
      x.fillStyle=CAT_COLOR[it.cat]||"#94a3b8"; x.beginPath(); x.arc(cx+18,ry,4.5,0,7); x.fill();
      F("600",15,"#e8edf6"); x.fillText(ell((it.qty>1?`${it.qty}× `:"")+it.name,COLW-150),cx+34,ry+5);
      F("700",15,"#cbd5e1"); x.textAlign="right"; x.fillText(fmt(it.combined),cx+COLW-14,ry+5); x.textAlign="left";
      if(i<items.length-1){ x.strokeStyle="rgba(255,255,255,.05)"; x.lineWidth=1; x.beginPath(); x.moveTo(cx+14,headH-28+(i+1)*rowH); x.lineTo(cx+COLW-14,headH-28+(i+1)*rowH); x.stroke(); }
    });
  };
  drawCol(m.give,giveX,"#a78bfa"); drawCol(m.get,getX,"#34d3ee");
  // totals band
  const ty=headH+listH+6, tw=W-PAD*2, th=totH-24;
  rr(PAD,ty,tw,th,16); const tg=x.createLinearGradient(PAD,ty,W-PAD,ty); tg.addColorStop(0,"rgba(124,58,237,.10)"); tg.addColorStop(1,"rgba(236,72,153,.10)"); x.fillStyle=tg; x.fill();
  x.strokeStyle="rgba(168,139,250,.25)"; x.lineWidth=1.2; rr(PAD,ty,tw,th,16); x.stroke();
  F("600",12,"#8aa0c6"); x.fillText("COMBINED  (give · get)",PAD+22,ty+28);
  F("800",24,"#f4f1ff"); x.fillText(`${fmt(m.totals.cgive)}  ·  ${fmt(m.totals.cget)}`,PAD+22,ty+60);
  F("600",12,"#8aa0c6"); x.fillText("SUPREME",PAD+22,ty+88); F("700",15,"#c4b5fd"); x.fillText(`${fmt(m.totals.sgive)} · ${fmt(m.totals.sget)}`,PAD+108,ty+88);
  F("600",12,"#8aa0c6"); x.fillText("MM2",W/2+30,ty+88); F("700",15,"#67e8f9"); x.fillText(`${fmt(m.totals.mgive)} · ${fmt(m.totals.mget)}`,W/2+78,ty+88);
  if(m.complete){ const cc=m.conf==="High"?"#34d399":m.conf==="Low"?"#fb7185":"#fbbf24"; F("800",13,cc); x.textAlign="right"; x.fillText(`${m.conf} confidence`,W-PAD-22,ty+28); x.textAlign="left"; }
  // footer
  const fy=H-footH+footH/2;
  x.strokeStyle="rgba(255,255,255,.07)"; x.lineWidth=1; x.beginPath(); x.moveTo(PAD,H-footH); x.lineTo(W-PAD,H-footH); x.stroke();
  F("600",13,"#8aa0c6"); x.fillText(`Values as of ${m.date} · ${m.live?"live":"cached"} · Supreme Values + MM2Values`,PAD,fy+5);
  F("800",13,"#a78bfa"); x.textAlign="right"; x.fillText("discord.gg/resurrect",W-PAD,fy+5); x.textAlign="left";
  return cv;
}
function openCardModal(){
  if(!(state.your.length && state.their.length)){ toast("Add items to both sides to make a trade card"); return; }
  const cv=drawTradeCard(tradeCardModel());
  if(!cv){ toast("Image export isn't supported on this browser"); return; }
  closeCardModal();
  const ov=document.createElement("div"); if(!ov||!ov.appendChild) return; ov.id="card-modal"; ov.className="modal-ov";
  const shareBtn = (typeof navigator!=="undefined"&&navigator.canShare) ? `<button class="btn btn-violet" data-cardact="share">${icon("link",14)} Share</button>` : "";
  const copyBtn = (typeof navigator!=="undefined"&&navigator.clipboard&&typeof window!=="undefined"&&window.ClipboardItem) ? `<button class="btn" data-cardact="copy">${icon("layers",14)} Copy</button>` : "";
  ov.innerHTML=`<div class="modal-card">
    <div class="modal-h"><span class="b row gap8">${icon("image",16)} Trade card</span><button class="icon-btn" data-cardact="close" aria-label="close">${icon("x",16)}</button></div>
    <div class="modal-canvas" id="card-canvas-wrap"></div>
    <div class="modal-actions">
      <button class="btn btn-violet" data-cardact="download">${icon("history",14)} Download PNG</button>
      ${shareBtn}${copyBtn}
      <button class="btn" data-cardact="close">Close</button>
    </div>
    <p class="modal-hint">Post it in a trade, a Discord server, or socials — it's branded and shows the full WFL verdict.</p>
  </div>`;
  (document.body||document.documentElement).appendChild(ov);
  cv.style.width="100%"; cv.style.height="auto"; cv.style.display="block"; cv.style.borderRadius="12px";
  const wrap=document.getElementById("card-canvas-wrap"); if(wrap) wrap.appendChild(cv);
  ov._canvas=cv;
  ov.addEventListener("click",e=>{ if(e.target===ov) closeCardModal(); });
}
function closeCardModal(){ const ov=document.getElementById("card-modal"); if(ov&&ov.remove) ov.remove(); }
function cardToBlob(cb){ const ov=document.getElementById("card-modal"), cv=ov&&ov._canvas; if(!cv||!cv.toBlob){ toast("Export not supported — try another browser"); return; } cv.toBlob(b=>{ if(b) cb(b); else toast("Couldn't render image"); },"image/png"); }
function cardDownload(){ cardToBlob(b=>{ try{ const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download="mm2-trade-card.png"; (document.body||document.documentElement).appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),2000); toast("✓ Trade card saved"); }catch(e){ toast("Couldn't save image"); } }); }
function cardShare(){ cardToBlob(async b=>{ try{ const f=new File([b],"mm2-trade-card.png",{type:"image/png"}); if(navigator.canShare&&navigator.canShare({files:[f]})) await navigator.share({files:[f],title:"MM2 Trade",text:"My Murder Mystery 2 trade — is it fair?"}); else cardDownload(); }catch(e){} }); }
function cardCopy(){ cardToBlob(async b=>{ try{ await navigator.clipboard.write([new window.ClipboardItem({"image/png":b})]); toast("✓ Card copied to clipboard"); }catch(e){ toast("Copy not supported — use Download"); } }); }

/* ===========================================================================
   EVENTS  (delegated once on #app)
   =========================================================================== */
const app=document.getElementById("app");
app.addEventListener("input",e=>{
  const inp=e.target.closest(".search-input"); if(!inp) return;
  const side=inp.dataset.side; state["q_"+side]=inp.value; state["active_"+side]=-1; showDropdown(side);
});
app.addEventListener("focusin",e=>{ const inp=e.target.closest(".search-input"); if(inp) showDropdown(inp.dataset.side); });
app.addEventListener("focusout",e=>{
  const inp=e.target.closest(".search-input"); if(!inp) return; const side=inp.dataset.side;
  setTimeout(()=>{ if(document.activeElement!==document.getElementById("si-"+side)) hideDropdown(side); },150);
});
app.addEventListener("keydown",e=>{
  const inp=e.target.closest(".search-input"); if(!inp) return; const side=inp.dataset.side;
  const matches=searchItems(side); if(!matches.length && e.key!=="Escape") return;
  if(e.key==="ArrowDown"){ e.preventDefault(); if(!document.getElementById("dd-"+side)) showDropdown(side); setActive(side,(state["active_"+side]<0?-1:state["active_"+side])+1,true); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(!document.getElementById("dd-"+side)) showDropdown(side); setActive(side,(state["active_"+side]<0?0:state["active_"+side])-1,true); }
  else if(e.key==="Enter"){ const idx=state["active_"+side]; const pick = idx>=0?matches[idx]:matches[0]; if(pick){ e.preventDefault(); addItem(side,pick.id); const si=document.getElementById("si-"+side); if(si) si.focus(); } }
  else if(e.key==="Escape"){ hideDropdown(side); inp.blur(); }
});
app.addEventListener("mousedown",e=>{ const opt=e.target.closest("[data-add]"); if(opt){ e.preventDefault(); addItem(opt.dataset.side,opt.dataset.add); } });
app.addEventListener("mousemove",e=>{ const opt=e.target.closest("[data-add]"); if(opt){ const s=opt.dataset.side,i=+opt.dataset.idx; if(state["active_"+s]!==i) setActive(s,i,false); } });
app.addEventListener("change",e=>{
  const t=e.target;
  if(t.closest("[data-action='theme']")){ state.theme=t.value; persist(); applyTheme(); }
  else if(t.closest("[data-action='sort']")){ state.sort=t.value; render(); }
  else if(t.closest("[data-action='catsel']")){ const side=t.dataset.side; state["cat_"+side]=t.value; state["active_"+side]=-1; render();
    const si=document.getElementById("si-"+side); if(si){ si.focus(); showDropdown(side); } }
});
app.addEventListener("click",e=>{
  const b=e.target.closest("[data-action]"); if(!b) return; const a=b.dataset.action;
  if(a==="view"){ if(state.view!==b.dataset.view){ state.view=b.dataset.view; prevVerdictKey=null; render(); if(state.view==="changes") loadChanges(); } }
  else if(a==="share"){ shareTrade(); }
  else if(a==="card"){ openCardModal(); }
  else if(a==="reloadChanges"){ changesLoaded=false; loadChanges(); }
  else if(a==="qadd"){ addItem(b.dataset.side,b.dataset.id); }
  else if(a==="clearq"){ const side=b.dataset.side; state["q_"+side]=""; render(); const si=document.getElementById("si-"+side); if(si) si.focus(); }
  else if(a==="qty"){ changeQty(b.dataset.side,b.dataset.id,parseInt(b.dataset.d,10)); }
  else if(a==="rm"){ removeItem(b.dataset.side,b.dataset.id); }
  else if(a==="fav"){ toggleFav(b.dataset.id); }
  else if(a==="addFav"){ state.view="calc"; addItem(b.dataset.side,b.dataset.id); }
  else if(a==="swap"){ const t=state.your; state.your=state.their; state.their=t; const qy=state.q_you; state.q_you=state.q_them; state.q_them=qy; prevVerdictKey=null; render(); }
  else if(a==="clear"){ state.your=[]; state.their=[]; state.q_you=""; state.q_them=""; prevVerdictKey=null; render(); }
  else if(a==="save"){ saveTrade(); }
  else if(a==="load"){ loadTrade(parseInt(b.dataset.id,10)); }
  else if(a==="delTrade"){ state.history=state.history.filter(h=>h.id!==parseInt(b.dataset.id,10)); persist(); render(); }
});

/* trade-card modal lives outside #app, so handle its controls + Escape at the document level */
document.addEventListener("click",e=>{ const b=e.target&&e.target.closest&&e.target.closest("[data-cardact]"); if(!b) return;
  const a=b.dataset.cardact;
  if(a==="download") cardDownload(); else if(a==="share") cardShare(); else if(a==="copy") cardCopy(); else if(a==="close") closeCardModal();
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeCardModal(); });

/* ---------------- data loading: cache → embedded fallback → live refresh ---------------- */
const DATA_KEY="mm2.values";
function validDataset(d){
  if(!d||typeof d!=="object"||!Array.isArray(d.items)||d.items.length<100) return false;
  return d.items.every(o=> o && typeof o.name==="string" && typeof o.category==="string"
    && (o.supreme==null||(Number.isFinite(o.supreme)&&o.supreme>=0))
    && (o.mm2==null||(Number.isFinite(o.mm2)&&o.mm2>=0))
    && (o.demand==null||(o.demand>=1&&o.demand<=11))
    && (o.rarity==null||(o.rarity>=1&&o.rarity<=11)) );
}
function applyDataset(d,src){
  if(!validDataset(d)) return false;
  buildData(d.items.map(jsonToItem));
  DATA_DATE=d.updatedAt||DATA_DATE; DATA_SRC=src; DATA_LIVE=(src==="live");
  state.your=state.your.filter(o=>BY_ID[o.id]);
  state.their=state.their.filter(o=>BY_ID[o.id]);
  state.favorites=state.favorites.filter(id=>BY_ID[id]);
  return true;
}
function applyCachedData(){ try{ const c=store.get(DATA_KEY,null); if(c&&applyDataset(c,"cache")) return true; }catch(e){} return false; }
async function refreshData(){
  if(!DATA_URL) return;                       // embedded/offline-only mode
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),7000);
    const res=await fetch(DATA_URL,{signal:ctrl.signal,cache:"no-store"}); clearTimeout(to);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const d=await res.json();
    if(!validDataset(d)){ console.warn("[mm2] values.json failed validation — keeping current data"); return; }
    const prevDate=DATA_DATE;
    if(applyDataset(d,"live")){
      try{ store.set(DATA_KEY,d); }catch(e){}
      if(!state.your.length && !state.their.length) loadFromHash();   // resolve shared items now in live data
      render();
      if(d.updatedAt && d.updatedAt!==prevDate) toast("✓ Values updated — "+d.updatedAt);
    }
  }catch(e){ console.warn("[mm2] value refresh unavailable, using cached/embedded:", e&&e.message); }
}
let toastTimer=null;
function toast(msg){
  try{
    let t=document.getElementById("toast");
    if(!t){ if(!document.createElement) return; t=document.createElement("div"); t.id="toast"; t.className="toast"; (document.body||document.documentElement).appendChild(t); }
    t.textContent=msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.classList.remove("show"); },3200);
  }catch(e){}
}

applyCachedData();   // instant freshness from last good pull (also covers offline-after-online)
loadFromHash();      // populate a shared trade from the URL (#t=…) if present
applyTheme();
render();
refreshData();       // background: pull latest if DATA_URL is configured
loadHistory();       // background: pull value-history for sparklines (graceful if absent)
// installable/offline when hosted over http(s); silent no-op as a local file or if sw.js is absent
if(typeof navigator!=="undefined" && "serviceWorker" in navigator && location.protocol.indexOf("http")===0){
  try{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }catch(e){}
}
